services:
  postgres:
    image: postgres:16
    container_name: market_price_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: market_price_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_price_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: node:22
    container_name: market_price_tracker_api
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      CLIENT_URL: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/market_price_tracker
      JWT_SECRET: replace-with-strong-secret
      ADMIN_BOOTSTRAP_EMAIL: admin@example.com
      ADMIN_BOOTSTRAP_PASSWORD: ChangeMe123!
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    volumes:
      - ./server:/app
      - ./db:/db
      - api_node_modules:/app/node_modules
    ports:
      - "4000:4000"

  ui:
    image: node:22
    container_name: market_price_tracker_ui
    working_dir: /app
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./client:/app
      - ui_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  api_node_modules:
  ui_node_modules:
